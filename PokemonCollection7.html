<!DOCTYPE html>
<html>
<head>
<style>
    :root { 
        --bg: #1a1a1a; --card-bg: #2d2d2d; --base-c: #ff3e3e; --jungle-c: #2ecc71; --fossil-c: #e67e22; --rocket-c: #c0392b;
        --card-scale: 1.2; 
    }
    body { font-family: sans-serif; background-color: var(--bg); color: #fff; padding: 20px; }
    
    .controls { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
    .actions-center { text-align: center; margin-bottom: 20px; }
    .header-container { display: flex; gap: 40px; justify-content: center; }
    .header-col { flex: 1; max-width: 400px; }
    
    .set-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .progress-bg { flex-grow: 1; height: 10px; background: #444; border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: #2ecc71; transition: width 0.3s; }
    
    #binderTable { width: 100%; border-collapse: collapse; background: #222; margin-top: 20px; font-size: 0.9rem; }
    #binderTable th, #binderTable td { padding: 8px; border: 1px solid #444; text-align: center; }
    #binderTable .thumb { width: calc(60px * var(--card-scale)); }

    #app { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .page-wrapper { width: calc(650px * var(--card-scale)); background: #111; padding: 15px; border-radius: 15px; }
    .page-header { font-size: 1.5rem; font-weight: bold; border-bottom: 3px solid; padding-bottom: 5px; display: inline-block; margin-bottom: 15px; }
    .binder-page { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    
    .card-slot { background: var(--card-bg); padding: 10px; border-radius: 8px; border: 2px solid #444; text-align: center; display: flex; flex-direction: column; }
    .thumb { width: 100%; height: auto; display: block; margin: 0 auto; }
    .card-slot.owned { border-color: #2ecc71; background: #1a2d1a; }
    .card-slot.pending { border-color: #f1c40f; background: #2d261a; }
    
    .price-input { width: 40px; background: #444; color: #f1c40f; border: 1px solid #666; text-align: center; }
    table { width: 100%; font-size: 0.75rem; border-collapse: collapse; margin-top: 5px; }
    body.hide-values .price-input, body.hide-values .price-col { display: none; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
    .modal-content { background: #222; padding: 30px; border-radius: 12px; width: 800px; display: flex; gap: 30px; border: 1px solid #444; }
    .modal-left { flex: 1; text-align: center; }
    .modal-right { flex: 2; }
    .val-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>

<div class="controls">
    <div class="actions-center">
        <h2>MASTER BINDER CONTROLS</h2>
        <button onclick="exportData()">Export JSON</button>
        <button onclick="document.getElementById('importFile').click()">Import JSON</button>
        <input type="file" id="importFile" onchange="importData(this)" style="display:none">
        <div style="margin-top:15px;">
            <button onclick="toggleView('grid')">Binder View</button>
            <button onclick="toggleView('table')">Table View</button>
        </div>
    </div>
    <div class="header-container">
        <div class="header-col">
            <h3>Card Sets</h3>
            <div id="setTrackers"></div>
        </div>
        <div class="header-col">
            <h3>Card Type</h3>
            <label><input type="checkbox" id="hideOwned" onchange="render()"> Hide Owned</label>
            <label><input type="checkbox" id="hidePending" onchange="render()"> Hide Pending</label>
            <label><input type="checkbox" id="hideUnl" onchange="render()"> Hide Unl</label>
            <label><input type="checkbox" id="hide1st" onchange="render()"> Hide 1st</label>
            <label><input type="checkbox" id="hideSdls" onchange="render()"> Hide SDLS</label>
            <label style="display:block; margin-top:10px; color:#f1c40f;"><input type="checkbox" id="hideValues" onchange="toggleValues(this.checked)"> Hide Values</label>
            <div style="margin-top:15px;">
                <label>Thumbnail/Card Scale</label><br>
                <input type="range" id="sizeSlider" min="0.4" max="2.0" step="0.05" value="1.2" oninput="updateScale(this.value)">
            </div>
        </div>
    </div>
</div>

<div id="app"></div>

<div id="valueModal" class="modal">
    <div class="modal-content">
        <div class="modal-left" id="modalLeft"></div>
        <div class="modal-right">

            <div id="priceData" class="val-grid"></div>
            <div style="margin-top:20px;">
                <button onclick="refreshCardPrices()">Refresh API Prices</button>
                <button onclick="document.getElementById('valueModal').style.display='none'">Close</button>
            </div>
        </div>
    </div>
</div>

        base: { name: "Base", color: "var(--base-c)", src: "base1", vars: ['unl', '1st', 'sdls', 'err'], cards: typeof baseCards !== 'undefined' ? baseCards : [] },

    let state = JSON.parse(localStorage.getItem('master_tracker')) || { settings: { scale: 1.2 } };
    let viewMode = 'grid';
    let hiddenSets = new Set();
    let currentModalKey = null;

    document.documentElement.style.setProperty('--card-scale', state.settings.scale || 1.2);
    
    function updateScale(val) {
        document.documentElement.style.setProperty('--card-scale', val);
        state.settings.scale = parseFloat(val);
        localStorage.setItem('master_tracker', JSON.stringify(state));
    }

    function toggleView(mode) { viewMode = mode; render(); }
    function toggleSet(sid, hidden) { hidden ? hiddenSets.add(sid) : hiddenSets.delete(sid); render(); }
    function toggleValues(hidden) { document.body.classList.toggle('hide-values', hidden); }

    function openModal(key) {
        currentModalKey = key;
        const [sid, num] = key.split('-');
        const card = sets[sid].cards.find(c => c.num == num);
        const d = state[key] || {};
        const p = d.prices || { raw: { nm:0, lp:0, mp:0, hp:0 }, psa: { 8:0, 9:0, 10:0 } };
        document.getElementById('modalLeft').innerHTML = `<img src="https://images.pokemontcg.io/${sets[sid].src}/${card.num}.png" style="width:200px"><h4>${card.name}</h4>`;

        `;
        document.getElementById('valueModal').style.display = 'flex';
    }

    async function refreshCardPrices() {
        const [sid, num] = currentModalKey.split('-');
        try {
            const res = await fetch(`https://api.pokemontcg.io/v2/cards/${sets[sid].src}-${num}`);
            const data = (await res.json()).data;
            if (!state[currentModalKey].prices) state[currentModalKey].prices = { raw: {}, psa: {} };
            state[currentModalKey].prices.raw.nm = data.tcgplayer?.prices?.holofoil?.market || data.tcgplayer?.prices?.normal?.market || 0;
            localStorage.setItem('master_tracker', JSON.stringify(state));
            openModal(currentModalKey);
        } catch(e) { alert("API Error"); }
    }

    function render() {
        const app = document.getElementById('app');

        // Render Set Trackers

        trackerContainer.innerHTML = '';
        for (const [sid, set] of Object.entries(sets)) {
            const percent = set.cards.length > 0 ? Math.round((set.cards.filter(c => state[`${sid}-${c.num}`]?.owned).length / set.cards.length) * 100) : 0;
            trackerContainer.innerHTML += `<div class="set-row"><input type="checkbox" ${!hiddenSets.has(sid) ? 'checked' : ''} onchange="toggleSet('${sid}', !this.checked)"> <span style="width:60px">${set.name}</span> <div class="progress-bg"><div class="progress-fill" style="width:${percent}%"></div></div> <span>${percent}%</span></div>`;
        }

        app.innerHTML = '';
        if (viewMode === 'table') {
            let html = `<table id="binderTable"><tr><th>Set</th><th>Num</th><th>IMG</th><th>Name</th><th>Pending</th><th>Owned</th></tr>`;
            for (const [sid, set] of Object.entries(sets)) {
                if (hiddenSets.has(sid)) continue;
                set.cards.forEach(c => {
                    const d = state[`${sid}-${c.num}`] || {};
                    html += `<tr><td>${set.name}</td><td>${c.num}</td><td><img class="thumb" src="https://images.pokemontcg.io/${set.src}/${c.num}.png"></td><td>${c.name}</td><td>${d.pending ? '✅' : ''}</td><td>${d.owned ? '✅' : ''}</td></tr>`;
                });
            }
            app.innerHTML = html + `</table>`;
        } else {
            for (const [sid, set] of Object.entries(sets)) {
                if (hiddenSets.has(sid)) continue;
                for(let i = 0; i < set.cards.length; i += 9) {
                    const pageWrapper = document.createElement('div');
                    pageWrapper.className = `page-wrapper`;
                    pageWrapper.innerHTML = `<div class="page-header" style="color:${set.color}; border-color:${set.color}">${set.name} P${(i/9)+1}</div><div class="binder-page"></div>`;
                    set.cards.slice(i, i + 9).forEach(c => {
                        const key = `${sid}-${c.num}`, d = state[key] || {};
                        if ((f.hideOwned && d.owned) || (f.hidePending && d.pending) || (f.hideUnl && d.unl) || (f.hide1st && d['1st']) || (f.hideSdls && d.sdls)) return;
                        const slot = document.createElement('div');
                        slot.className = `card-slot ${d.owned ? 'owned' : ''} ${d.pending ? 'pending' : ''}`;
                        slot.innerHTML = `<img class="thumb" src="https://images.pokemontcg.io/${set.src}/${c.num}.png"><div style="font-size:0.7rem">${c.num}</div><div><input type="checkbox" ${d.pending ? 'checked' : ''} onchange="update('${key}', 'pending', this.checked)"> Pending</div><table>${set.vars.map(v => `<tr><td><input type="checkbox" ${d[v] ? 'checked' : ''} onchange="update('${key}', '${v}', this.checked)"> ${v.toUpperCase()}</td><td class="price-col"><input type="number" class="price-input" value="${d[v+'Price'] || 0}" onchange="update('${key}', '${v+'Price'}', this.value)"></td></tr>`).join('')}</table><button onclick="openModal('${key}')">More Values</button>`;
                        pageWrapper.querySelector('.binder-page').appendChild(slot);
                    });
                    app.appendChild(pageWrapper);
                }
            }
        }
    }

    function update(key, variant, val) {
        if(!state[key]) state[key] = {};
        state[key][variant] = val;
        state[key].owned = ['unl', '1st', 'sdls', 'err', 'fp'].some(k => state[key][k] === true);
        localStorage.setItem('master_tracker', JSON.stringify(state));
        render();
    }
    
    function exportData() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
        a.download = "master_tracker.json"; a.click();
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = (e) => { state = JSON.parse(e.target.result); localStorage.setItem('master_tracker', JSON.stringify(state)); render(); };
        reader.readAsText(input.files[0]);
    }
    
    render();
</script>
</body>
</html>
